<!DOCTYPE html>
<html>
<head>
  <title>A Simple Quiz</title>
  <link rel="stylesheet" href="A_Simple_Quiz.css">
</head>
<body>
  <main class="quiz_container">
    <h2 id="question">What is the capital of France? </h2>
    <div id="options">
      <button class="option" data-index="0">Albany</button>
      <button class="option" data-index="1">Paris</button>
      <button class="option" data-index="2">London</button>
      <button class="option" data-index="3">Berlin</button>
      <button class="option" data-index="4">Madrid</button>
    </div>
    <h3 id="score">Score: 0</h3>
  </main>
  <script src="A_Simple_Quiz.js"></script>
</body>
</html>
